name: Run Tests

on:
        push:
        pull_request:

jobs:
        test:
                runs-on: ${{ matrix.os }}

                strategy:
                        matrix:
                                os:
                                        [
                                                ubuntu-latest,
                                                macos-latest,
                                                windows-latest,
                                        ]

                steps:
                        - name: Checkout repo
                          uses: actions/checkout@v4

                        - name: Install build tools (Linux)
                          if: runner.os == 'Linux'
                          run: sudo apt-get update && sudo apt-get install -y build-essential

                        - name: Install build tools (macOS)
                          if: runner.os == 'macOS'
                          run: brew install make || true

                        - name: Build gink (Linux/macOS)
                          if: runner.os != 'Windows'
                          run: make

                        - name: Build tests (Linux/macOS)
                          if: runner.os != 'Windows'
                          run: make
                          working-directory: test

                        - name: Run tests (Linux/macOS)
                          if: runner.os != 'Windows'
                          run: ./test_runner
                          working-directory: test

                        - name: Build + Test (Windows via bash)
                          if: runner.os == 'Windows'
                          shell: bash
                          run: |
                                  make windows
                                  cd test
                                  make
                                  ./test_runner.exe
