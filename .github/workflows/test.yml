name: Run Tests

on:
        push:
        pull_request:

jobs:
        test:
                runs-on: ${{ matrix.os }}

                strategy:
                        matrix:
                                os:
                                        [
                                                ubuntu-latest,
                                                macos-latest,
                                                windows-latest,
                                        ]

                steps:
                        - name: Checkout repo
                          uses: actions/checkout@v4

                        - name: Install build tools (Linux)
                          if: runner.os == 'Linux'
                          run: sudo apt-get update && sudo apt-get install -y build-essential

                        - name: Install build tools (macOS)
                          if: runner.os == 'macOS'
                          run: brew install make || true

                        - name: Build tests
                          run: make
                          working-directory: test

                        - name: Run tests
                          run: ./test_runner
                          working-directory: test
